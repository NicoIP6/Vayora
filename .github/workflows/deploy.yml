name: CI/CD Vayora

on:
  push:
    branches: ["main", "test"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
      sha_short: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lower case owner name
        id: owner
        run: echo "owner_lc=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set short git commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Dry Run Build
        run: |
          docker build -t test-web -f ./vayora-app.dockerfile .
          docker build -t test-weather -f ./weather-app.dockerfile .

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web App
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./vayora-app.dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/vayora-app:latest
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/vayora-app:${{ steps.vars.outputs.sha_short }}

      - name: Build and push Weather App
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./weather-app.dockerfile # <-- CORRIGÉ : dockerfile (avec un C)
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/vayora-weather:latest
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/vayora-weather:${{ steps.vars.outputs.sha_short }}

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/vayora
            docker compose pull
            docker compose up -d
            docker image prune -f

  config-check-vps:
    needs: build-and-test
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: SSH Config Check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/vayora
            docker compose config -q && echo "La configuration Docker Compose est valide !"